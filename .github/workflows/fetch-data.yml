name: Fetch daily data

on:
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC = 7:00 AM Colombia / 8:00 AM EST
  workflow_dispatch:         # permite correrlo manualmente desde GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news and market data
        run: python run.py --fetch-only

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Data $(date +%Y-%m-%d)"
          git push origin main
